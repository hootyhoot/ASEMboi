name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-mirror:
    runs-on: ubuntu-latest
    # Mirrors the site to ASEMboi/ASEMboi.github.io on every push.
    # Prerequisites:
    #   1. Create a GitHub account named "ASEMboi"
    #   2. Create repo ASEMboi/ASEMboi.github.io (public, enable Pages on main)
    #   3. Generate a Personal Access Token on the ASEMboi account (repo scope)
    #   4. Add it as secret ASEMBOI_DEPLOY_TOKEN on THIS repo (hootyhoot/ASEM)
    #      Settings → Secrets and variables → Actions → New repository secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to ASEMboi/ASEMboi.github.io
        env:
          TOKEN: ${{ secrets.ASEMBOI_DEPLOY_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ASEMBOI_DEPLOY_TOKEN not set — skipping mirror deploy"
            exit 0
          fi
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote add mirror https://x-access-token:${TOKEN}@github.com/ASEMboi/ASEMboi.github.io.git
          git push mirror main --force
